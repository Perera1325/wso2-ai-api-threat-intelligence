<!DOCTYPE html>
<html>
<head>
    <title>AI API Threat Intelligence</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>AI API Behavioral Threat Intelligence</h1>

    <div class="card">
        <h2>Analyze User Behavior</h2>
        <input type="text" id="userId" placeholder="Enter User ID (e.g., U1)">
        <button onclick="analyzeUser()">Analyze</button>
        <p id="result"></p>
    </div>

    <div class="card">
    <h2>All Users Risk Ranking</h2>
    <button onclick="loadAllUsers()">Load Users</button>
    <div id="userTable"></div>
</div>

    <div class="card">
        <h2>System Status</h2>
        <p id="status">Checking...</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
